spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# OpenAI
openai.api.key=${OPENAI_API_KEY}
openai.model=${OPENAI_MODEL}
openai.api.url=${OPENAI_API_URL}

# VNPay
vnpay.tmnCode=${VNPAY_TMN_CODE}
vnpay.hashSecret=${VNPAY_HASH_SECRET}
vnpay.payUrl=${VNPAY_PAY_URL}
vnpay.returnUrl=${VNPAY_RETURN_URL}

# PayPal
paypal.client-id=${PAYPAL_CLIENT_ID}
paypal.client-secret=${PAYPAL_CLIENT_SECRET}
paypal.base-url=${PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}
paypal.currency=${PAYPAL_CURRENCY:USD}
paypal.vnd-to-usd-rate=${PAYPAL_VND_TO_USD_RATE:25000}

# Email - Brevo REST API (thay thế hoàn toàn SMTP/JavaMailSender)
# Deploy Render: chỉ cần cấu hình 3 biến BREVO_API_KEY, BREVO_SENDER_NAME, BREVO_SENDER_EMAIL.
brevo.api-key=${BREVO_API_KEY}
brevo.sender-name=${BREVO_SENDER_NAME}
brevo.sender-email=${BREVO_SENDER_EMAIL}
brevo.api-url=${BREVO_API_URL:https://api.brevo.com/v3/smtp/email}
# URL frontend dùng cho nút trong email (mặc định localhost, có thể override khi deploy).
brevo.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
# Thông tin liên hệ hiển thị ở footer email (đều có default, không bắt buộc).
brevo.shop-hotline=${SHOP_HOTLINE:1900 6789}
brevo.shop-email=${SHOP_EMAIL:support@interiorshop.vn}
brevo.shop-facebook=${SHOP_FACEBOOK:https://facebook.com/interiorshop}
brevo.shop-website=${SHOP_WEBSITE:https://interiorshop.vn}

# Upload
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Server
server.port=${SERVER_PORT}
server.forward-headers-strategy=framework

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:http://localhost:5173/login/success}

# Supabase
supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_KEY}
supabase.bucket=${SUPABASE_IMAGE_BUCKET}
supabase.model-bucket=${SUPABASE_MODEL_BUCKET}
supabase.model-prefix=${SUPABASE_MODEL_PREFIX}
supabase.max-model-size-bytes=${SUPABASE_MAX_MODEL_SIZE_BYTES}

# GHN
ghn.base-url=${GHN_BASE_URL}
ghn.token=${GHN_TOKEN}
ghn.shop-id=${GHN_SHOP_ID}
ghn.from-district-id=${GHN_FROM_DISTRICT_ID}
ghn.default-height=${GHN_DEFAULT_HEIGHT}
ghn.default-length=${GHN_DEFAULT_LENGTH}
ghn.default-width=${GHN_DEFAULT_WIDTH}
ghn.default-weight=${GHN_DEFAULT_WEIGHT}
ghn.default-insurance-value=${GHN_DEFAULT_INSURANCE_VALUE}
ghn.retry-attempts=${GHN_RETRY_ATTEMPTS}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
